<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Focus Board</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Daily Focus Board</h1>
      <p class="subtitle">Add your tasks, stay focused, and finish strong.</p>

      <form id="taskForm" class="task-form">
        <input id="taskInput" type="text" placeholder="Enter a task..." autocomplete="off" />
        <button type="submit">Add Task</button>
      </form>

      <div class="stats">
        <span id="totalCount">0 total</span>
        <span id="doneCount">0 done</span>
      </div>

      <ul id="taskList" class="task-list"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>

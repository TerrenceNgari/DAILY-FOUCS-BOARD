<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Focus</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #111827, #1f2937);
      color: white;
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .card {
      max-width: 500px;
      padding: 32px;
      border-radius: 20px;
      background: rgba(255,255,255,0.08);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    h1 { margin-bottom: 12px; }
    p { font-size: 1.1rem; line-height: 1.6; }
    button {
      margin-top: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 999px;
      background: #60a5fa;
      color: white;
      cursor: pointer;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Daily Focus</h1>
    <p id="message">Small steps today. Big results tomorrow.</p>
    <button onclick="newMessage()">New Message</button>
  </div>

  <script>
    const messages = [
      "Small steps today. Big results tomorrow.",
      "Stay consistent, not perfect.",
      "Progress beats pressure.",
      "One task at a time.",
      "You do not need motivation to begin."
    ];

    function newMessage() {
      document.getElementById("message").innerText =
        messages[Math.floor(Math.random() * messages.length)];
    }
  </script>
</body>
</html>
